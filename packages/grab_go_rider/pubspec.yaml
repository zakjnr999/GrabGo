name: grab_go_rider
description: "GrabGo Rider - Delivery driver app for GrabGo food delivery platform."
publish_to: "none"
version: 1.0.0+1
resolution: workspace

environment:
  sdk: ^3.10.0-290.4

dependencies:
  flutter:
    sdk: flutter
  grab_go_shared:
    path: ../grab_go_shared
  cupertino_icons: ^1.0.8
  smooth_page_indicator: ^1.2.1
  flutter_image_slideshow: ^0.1.6
  readmore: ^3.0.0
  http: ^1.1.2
  go_router: ^16.2.4
  flutter_otp_text_field: ^1.5.1+1
  google_sign_in: ^7.2.0
  provider: ^6.1.5+1
  fluttertoast: ^9.0.0
  shared_preferences: ^2.5.3
  animations: ^2.0.11
  flutter_screenutil: ^5.9.3
  flutter_spinkit: ^5.2.2
  animated_text_kit: ^4.2.3
  dio: ^5.9.0
  flutter_svg: ^2.2.1
  flutter_gen: ^5.12.0
  flutter_credit_card: ^4.1.0
  dotted_line: ^3.2.3
  flutter_slidable: ^4.0.3
  flutter_swipe_action_cell: ^3.1.6
  webview_flutter: ^4.13.0
  uuid: ^4.5.1
  pay_with_paystack: ^1.0.14
  awesome_dialog: ^3.3.0
  progress_tracker: ^0.0.16
  chopper: ^8.4.0
  json_annotation: ^4.9.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  swipe_refresh: ^1.1.2
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  intl: ^0.20.2
  easy_stepper: ^0.9.1
  image_picker: ^1.2.0
  firebase_core: 3.15.2
  firebase_auth: 5.3.3
  path_provider: ^2.1.4
  crypto: ^3.0.5
  get_it: ^9.0.5
  pinput: ^5.0.2
  firebase_app_check: 0.2.1+2
  url_launcher: ^6.3.2
  flutter_launcher_icons: ^0.14.4
  change_app_package_name: ^1.5.0
  socket_io_client: ^2.0.3+1
  record: ^5.1.2
  audioplayers: ^6.1.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  flutter_gen_runner: ^5.4.0
  flutter_lints: ^6.0.0
  chopper_generator: ^8.4.0
  json_serializable: ^6.9.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "../grab_go_shared/lib/assets/icons/app_icon_rider_main.png"
  adaptive_icon_foreground: "../grab_go_shared/lib/assets/icons/foreground_icon_rider.png"
  adaptive_icon_background: "../grab_go_shared/lib/assets/icons/background_icon_rider.png"
  adaptive_icon_monochrome: "../grab_go_shared/lib/assets/icons/app_icon_rider_monochrome.png"

flutter:
  uses-material-design: true
