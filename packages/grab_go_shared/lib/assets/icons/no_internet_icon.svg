<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Floor Drop Shadow -->
  <ellipse cx="120" cy="205" rx="70" ry="10" fill="rgba(231,111,81,0.08)" />

  <!-- Floating Background Elements (Offline Theme) -->
  
  <!-- Top Left Cloud -->
  <g transform="translate(30, 60)">
    <!-- Cloud Shadow -->
    <g transform="translate(0, 4)" fill="rgba(71,85,105,0.05)">
      <circle cx="25" cy="20" r="10" />
      <circle cx="45" cy="15" r="15" />
      <circle cx="55" cy="25" r="10" />
      <rect x="25" y="15" width="30" height="20" rx="10" />
    </g>
    <!-- Cloud Base -->
    <g fill="#F1F5F9">
      <circle cx="25" cy="20" r="10" />
      <circle cx="45" cy="15" r="15" />
      <circle cx="55" cy="25" r="10" />
      <rect x="25" y="15" width="30" height="20" rx="10" />
    </g>
  </g>

  <!-- Bottom Right Small Cloud -->
  <g transform="translate(130, 140) scale(0.7)">
    <g fill="#F1F5F9">
      <circle cx="25" cy="20" r="10" />
      <circle cx="45" cy="15" r="15" />
      <circle cx="55" cy="25" r="10" />
      <rect x="25" y="15" width="30" height="20" rx="10" />
    </g>
  </g>

  <!-- Floating Sparkle (Warning Orange) -->
  <g transform="translate(45, 145) rotate(15) scale(0.6)">
    <path d="M 5,-10 Q 5,5 20,5 Q 5,5 5,20 Q 5,5 -10,5 Q 5,5 5,-10 Z" fill="rgba(244,162,97,0.3)" />
    <path d="M 0,-15 Q 0,0 15,0 Q 0,0 0,15 Q 0,0 -15,0 Q 0,0 0,-15 Z" fill="#F4A261" />
  </g>

  <!-- Floating Exclamation Mark -->
  <g transform="translate(195, 140) rotate(15)">
    <rect x="-3" y="-10" width="6" height="14" rx="3" fill="#F4A261" />
    <circle cx="0" cy="10" r="3" fill="#F4A261" />
  </g>

  <!-- Floating 'X' Mark -->
  <g transform="translate(45, 190) rotate(25)">
    <path d="M -6,-6 L 6,6 M -6,6 L 6,-6" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- Main Object: The Mobile Phone -->
  <!-- Phone Drop Shadow / 3D Edge -->
  <rect x="70" y="55" width="100" height="150" rx="18" fill="rgba(42,157,143,0.15)" transform="translate(-2, 6)" />
  
  <!-- Phone Body -->
  <rect x="70" y="55" width="100" height="150" rx="18" fill="#2A9D8F" />
  
  <!-- Phone Screen -->
  <rect x="78" y="63" width="84" height="134" rx="12" fill="#FFFFFF" />
  
  <!-- Top Notch -->
  <rect x="105" y="58" width="30" height="15" rx="5" fill="#2A9D8F" />

  <!-- The "Dead/Sad" Face on the screen -->
  <g transform="translate(0, 5)">
    <!-- Left Eye (X) -->
    <path d="M 103,110 L 113,120 M 103,120 L 113,110" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round" />
    <!-- Right Eye (X) -->
    <path d="M 127,110 L 137,120 M 127,120 L 137,110" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round" />
    <!-- Sad Mouth -->
    <path d="M 112,140 Q 120,132 128,140" fill="none" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round" />
  </g>

  <!-- Alert Badge: Broken Wi-Fi -->
  <g transform="translate(170, 50)">
    <!-- Badge Shadow -->
    <circle cx="0" cy="5" r="32" fill="rgba(230,57,70,0.15)" />
    <!-- Badge Background -->
    <circle cx="0" cy="0" r="32" fill="#E63946" />
    
    <!-- Wi-Fi Waves -->
    <circle cx="0" cy="14" r="5" fill="#FFFFFF" />
    <path d="M -12,4 A 16,16 0 0,1 12,4" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />
    <path d="M -22,-6 A 30,30 0 0,1 22,-6" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />

    <!-- The Break / Slash -->
    <!-- Thick red stroke underneath creates a perfect 'cutout' gap through the waves -->
    <line x1="-16" y1="-18" x2="16" y2="14" stroke="#E63946" stroke-width="10" stroke-linecap="round" />
    <!-- White slash inside -->
    <line x1="-16" y1="-18" x2="16" y2="14" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />
  </g>

</svg>