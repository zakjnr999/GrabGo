<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Floor Drop Shadow -->
  <ellipse cx="120" cy="205" rx="80" ry="12" fill="#2A9D8F" fill-opacity="0.15" />

  <!-- Floating Leaf -->
  <g transform="translate(45, 175) rotate(-20) scale(0.6)">
    <path d="M 5,5 C 20,-15 40,-5 45,15 C 30,35 10,25 5,5 Z" fill="#80B918" fill-opacity="0.2" />
    <path d="M 0,0 C 15,-20 35,-10 40,10 C 25,30 5,20 0,0 Z" fill="#80B918" />
  </g>

  <!-- Sparkles -->
  <g transform="translate(190, 60) rotate(15) scale(0.7)">
    <path d="M 5,-10 Q 5,5 20,5 Q 5,5 5,20 Q 5,5 -10,5 Q 5,5 5,-10 Z" fill="#FFD166" fill-opacity="0.3" />
    <path d="M 0,-15 Q 0,0 15,0 Q 0,0 0,15 Q 0,0 -15,0 Q 0,0 0,-15 Z" fill="#FFD166" />
  </g>

  <!-- Main Wallet Group -->
  <g transform="translate(0, 10)">
    
    <!-- Wallet Back Cover (Darker Teal) -->
    <rect x="50" y="80" width="140" height="90" rx="12" fill="#21867A" />
    
    <!-- Cash / Receipt (White Paper sticking out) -->
    <g transform="translate(100, 75) rotate(-5)">
      <rect x="-35" y="-25" width="70" height="40" rx="4" fill="#F8FAFC" />
      <rect x="-25" y="-15" width="40" height="4" rx="2" fill="#E2E8F0" />
      <rect x="-25" y="-5" width="25" height="4" rx="2" fill="#E2E8F0" />
      <path d="M -35,15 L -25,10 L -15,15 L -5,10 L 5,15 L 15,10 L 25,15 L 35,10" fill="none" stroke="#F8FAFC" stroke-width="4" />
    </g>

    <!-- Credit Card (GrabGO Orange, angled & popping out) -->
    <g transform="translate(130, 80) rotate(12)">
      <!-- Card Body -->
      <rect x="-50" y="-35" width="100" height="60" rx="6" fill="#F4A261" />
      
      <!-- Magnetic Stripe / Accent -->
      <rect x="-50" y="-10" width="100" height="12" fill="#E76F51" opacity="0.8" />
      
      <!-- Gold EMV Chip -->
      <rect x="-35" y="-25" width="16" height="12" rx="3" fill="#FFD166" />
      <line x1="-35" y1="-19" x2="-19" y2="-19" stroke="#F4A261" stroke-width="1.5" />
      
      <!-- Card Logo / Circles -->
      <circle cx="25" cy="-20" r="8" fill="#FFFFFF" opacity="0.4" />
      <circle cx="35" cy="-20" r="8" fill="#FFFFFF" opacity="0.4" />
    </g>

    <!-- Wallet Front Pocket (Main Teal) -->
    <path d="M 50,105 Q 120,135 190,105 L 190,158 C 190,164.6 184.6,170 178,170 L 62,170 C 55.4,170 50,164.6 50,158 Z" fill="#2A9D8F" />
    
    <!-- Pocket Top Edge Highlight -->
    <path d="M 50,105 Q 120,135 190,105" fill="none" stroke="#38B2A5" stroke-width="4" stroke-linecap="round" />
    
    <!-- Wallet Button / Emblem -->
    <circle cx="120" cy="140" r="14" fill="#F8FAFC" />
    <circle cx="120" cy="140" r="8" fill="#2A9D8F" />
    <path d="M 116,140 L 120,144 L 126,136" fill="none" stroke="#F8FAFC" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Floating Coin 1 (Right Side) -->
  <g transform="translate(195, 140) rotate(15)">
    <!-- Coin Shadow -->
    <circle cx="0" cy="8" r="20" fill="#000000" fill-opacity="0.15" />
    <!-- Coin Base -->
    <circle cx="0" cy="0" r="20" fill="#FFD166" />
    <!-- Coin Inner Rim -->
    <circle cx="0" cy="0" r="15" fill="none" stroke="#F4A261" stroke-width="2.5" />
    <!-- Cedi Sign -->
    <path d="M -5,-7 C -10,-3 -10,3 -5,7 C -2,10 3,10 7,7" fill="none" stroke="#E76F51" stroke-width="2.5" stroke-linecap="round" />
    <line x1="-1" y1="-10" x2="-1" y2="10" stroke="#E76F51" stroke-width="2.5" stroke-linecap="round" />
    <line x1="-4" y1="-1" x2="5" y2="-1" stroke="#E76F51" stroke-width="2.5" stroke-linecap="round" />
  </g>

  <!-- Floating Coin 2 (Left Side) -->
  <g transform="translate(40, 95) rotate(-15) scale(0.75)">
    <!-- Coin Shadow -->
    <circle cx="0" cy="8" r="20" fill="#000000" fill-opacity="0.15" />
    <!-- Coin Base -->
    <circle cx="0" cy="0" r="20" fill="#FFD166" />
    <!-- Coin Inner Rim -->
    <circle cx="0" cy="0" r="15" fill="none" stroke="#F4A261" stroke-width="2.5" />
    <!-- Cedi Sign -->
    <path d="M -5,-7 C -10,-3 -10,3 -5,7 C -2,10 3,10 7,7" fill="none" stroke="#E76F51" stroke-width="2.5" stroke-linecap="round" />
    <line x1="-1" y1="-10" x2="-1" y2="10" stroke="#E76F51" stroke-width="2.5" stroke-linecap="round" />
    <line x1="-4" y1="-1" x2="5" y2="-1" stroke="#E76F51" stroke-width="2.5" stroke-linecap="round" />
  </g>

</svg>
