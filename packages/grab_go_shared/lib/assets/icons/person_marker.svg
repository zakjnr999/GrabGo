<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft drop shadow for the sticker effect -->
    <filter id="stickerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- === THE FULL HUMAN AVATAR === -->
  <g transform="translate(0, -6)" filter="url(#stickerShadow)">

    <!-- === AVATAR COLORS & 3D LIGHTING === -->
    
    <!-- Legs (Dark Slate Pants) -->
    <!-- Left Leg -->
    <rect x="50" y="70" width="8" height="30" rx="2" fill="#334155" />
    <!-- Right Leg (Slightly darker for shadow depth) -->
    <rect x="62" y="70" width="8" height="30" rx="2" fill="#1E293B" />
    
    <!-- Pelvis/Waist connecting the legs -->
    <path d="M 50,70 L 70,70 L 70,78 L 50,78 Z" fill="#334155" />
    <path d="M 60,70 L 70,70 L 70,78 L 60,78 Z" fill="#1E293B" />

    <!-- Shoes (White/Grey Sneakers) -->
    <!-- Left Shoe -->
    <rect x="47" y="98" width="11" height="6" rx="3" fill="#F8FAFC" />
    <!-- Right Shoe -->
    <rect x="62" y="98" width="11" height="6" rx="3" fill="#E2E8F0" />
    <!-- Shoe Soles -->
    <rect x="47" y="102" width="11" height="2" rx="1" fill="#CBD5E1" />
    <rect x="62" y="102" width="11" height="2" rx="1" fill="#94A3B8" />

    <!-- Shirt (Sky Blue) -->
    <rect x="46" y="40" width="28" height="34" rx="8" fill="#38BDF8" />
    <!-- Shirt Right-Side Shadow -->
    <path d="M 60,40 L 66,40 C 70.4,40 74,43.6 74,48 L 74,74 L 60,74 Z" fill="#0284C7" />
    
    <!-- Undershirt / V-Neck -->
    <path d="M 55,40 L 65,40 L 60,48 Z" fill="#F8FAFC" />
    <path d="M 60,40 L 65,40 L 60,48 Z" fill="#E2E8F0" />

    <!-- Arms & Hands -->
    <!-- Left Arm -->
    <rect x="42" y="44" width="8" height="22" rx="4" fill="#38BDF8" transform="rotate(10, 46, 44)" />
    <circle cx="41.5" cy="67" r="3.5" fill="#FFDCA8" />
    
    <!-- Right Arm -->
    <rect x="70" y="44" width="8" height="22" rx="4" fill="#0284C7" transform="rotate(-10, 74, 44)" />
    <circle cx="78.5" cy="67" r="3.5" fill="#E6A37A" />

    <!-- Neck -->
    <rect x="57" y="32" width="6" height="10" fill="#F5B892" />

    <!-- Head -->
    <circle cx="60" cy="24" r="13" fill="#FFDCA8" />
    <!-- Head Right-Side Shadow -->
    <path d="M 60,11 A 13,13 0 0,1 73,24 A 13,13 0 0,1 60,37 Z" fill="#F5B892" />

    <!-- Face Details (Happy/Friendly expression) -->
    <circle cx="55" cy="26" r="1.8" fill="#334155" />
    <circle cx="65" cy="26" r="1.8" fill="#334155" />
    
    <!-- Cheeks (Enhanced to match reference) -->
    <circle cx="49" cy="29" r="2.5" fill="#FCA5A5" />
    <circle cx="71" cy="29" r="2.5" fill="#F87171" /> 
    
    <path d="M 57,30 Q 60,33 63,30" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" />

    <!-- === GLOSSY PREMIUM HIGHLIGHTS === -->
    <!-- Shirt Highlight -->
    <path d="M 48,46 L 48,60" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.4" />
  </g>

</svg>