<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <!-- Perfectly calculated perforated ticket shape -->
    <path id="ticket" d="M 12,0 L 128,0 A 12,12 0 0,1 140,12 L 140,30 A 14,14 0 0,0 140,58 L 140,76 A 12,12 0 0,1 128,88 L 12,88 A 12,12 0 0,1 0,76 L 0,58 A 14,14 0 0,0 0,30 L 0,12 A 12,12 0 0,1 12,0 Z" />
    <clipPath id="ticketClip">
      <use href="#ticket" />
    </clipPath>
  </defs>

  <!-- Floor Drop Shadow -->
  <ellipse cx="120" cy="205" rx="80" ry="12" fill="rgba(42,157,143,0.15)" />

  <!-- === BACKGROUND TICKET (Teal) === -->
  <g transform="translate(80, 65) rotate(15)">
    <!-- Shadow -->
    <use href="#ticket" fill="rgba(0,0,0,0.1)" transform="translate(4, 6)" />
    
    <!-- Ticket Body & Styling -->
    <g clip-path="url(#ticketClip)">
      <use href="#ticket" fill="#2A9D8F" />
      <!-- Left Stub -->
      <rect x="0" y="0" width="45" height="88" fill="#21867A" />
      <!-- Perforation Line -->
      <line x1="45" y1="0" x2="45" y2="88" stroke="#FFFFFF" stroke-dasharray="6 4" stroke-width="3" opacity="0.4" />
    </g>
    
    <!-- Placeholder Text / Barcode lines on the Teal ticket -->
    <rect x="65" y="24" width="45" height="6" rx="3" fill="#FFFFFF" opacity="0.4" />
    <rect x="65" y="40" width="60" height="6" rx="3" fill="#FFFFFF" opacity="0.4" />
    <rect x="65" y="56" width="35" height="6" rx="3" fill="#FFFFFF" opacity="0.4" />
  </g>

  <!-- === FOREGROUND TICKET (Orange) === -->
  <g transform="translate(45, 105) rotate(-10)">
    <!-- Shadow -->
    <use href="#ticket" fill="rgba(0,0,0,0.15)" transform="translate(-2, 8)" />
    
    <!-- Ticket Body & Styling -->
    <g clip-path="url(#ticketClip)">
      <use href="#ticket" fill="#F4A261" />
      <!-- Left Stub (Accent Orange) -->
      <rect x="0" y="0" width="45" height="88" fill="#E76F51" />
      <!-- Perforation Line -->
      <line x1="45" y1="0" x2="45" y2="88" stroke="#FFFFFF" stroke-dasharray="6 4" stroke-width="3" />
    </g>
    
    <!-- Percentage Sign on the stub -->
    <text x="22.5" y="56" fill="#FFFFFF" font-family="sans-serif" font-weight="900" font-size="34" text-anchor="middle">%</text>
    
    <!-- "PROMO" Text and layout lines -->
    <text x="60" y="38" fill="#FFFFFF" font-family="sans-serif" font-weight="900" font-size="20" letter-spacing="1.5">PROMO</text>
    <rect x="60" y="50" width="50" height="8" rx="4" fill="#FFFFFF" opacity="0.7" />
    <rect x="60" y="66" width="30" height="6" rx="3" fill="#FFFFFF" opacity="0.5" />
  </g>

  <!-- === THE RED STAR BADGE (Highlights premium status) === -->
  <g transform="translate(170, 155) rotate(-5)">
    <!-- Badge Shadow -->
    <circle cx="0" cy="6" r="26" fill="rgba(0,0,0,0.2)" />
    <!-- Red Badge Base -->
    <circle cx="0" cy="0" r="26" fill="#E63946" />
    <!-- Inner White Border -->
    <circle cx="0" cy="0" r="21" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="4 3" opacity="0.9" />
    <!-- Center Star -->
    <path d="M 0,-12 L 3.5,-4 L 12,-3 L 5.5,3 L 7,12 L 0,8 L -7,12 L -5.5,3 L -12,-3 L -3.5,-4 Z" fill="#FFFFFF" />
  </g>

  <!-- === FLOATING COIN (Emphasizes money saved) === -->
  <g transform="translate(45, 60) rotate(-15) scale(0.8)">
    <circle cx="0" cy="8" r="20" fill="rgba(0,0,0,0.15)" />
    <circle cx="0" cy="0" r="20" fill="#FFD166" />
    <circle cx="0" cy="0" r="15" fill="none" stroke="#F4A261" stroke-width="2.5" />
    <text x="-1" y="7" fill="#E76F51" font-family="sans-serif" font-weight="900" font-size="18" text-anchor="middle">₵</text>
  </g>

  <!-- === FLOATING LEAF === -->
  <g transform="translate(30, 180) rotate(-35) scale(0.6)">
    <path d="M 5,5 C 20,-15 40,-5 45,15 C 30,35 10,25 5,5 Z" fill="rgba(128,185,24,0.2)" />
    <path d="M 0,0 C 15,-20 35,-10 40,10 C 25,30 5,20 0,0 Z" fill="#80B918" />
  </g>

  <!-- === BRAND SPARKLES === -->
  <g transform="translate(180, 70) rotate(15) scale(0.7)">
    <path d="M 5,-10 Q 5,5 20,5 Q 5,5 5,20 Q 5,5 -10,5 Q 5,5 5,-10 Z" fill="rgba(255,209,102,0.3)" />
    <path d="M 0,-15 Q 0,0 15,0 Q 0,0 0,15 Q 0,0 -15,0 Q 0,0 0,-15 Z" fill="#FFD166" />
  </g>
  <g transform="translate(100, 40) rotate(5) scale(0.5)">
    <path d="M 0,-15 Q 0,0 15,0 Q 0,0 0,15 Q 0,0 -15,0 Q 0,0 0,-15 Z" fill="#2A9D8F" opacity="0.6" />
  </g>

</svg>