<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- === THE SCOOTER (Top-Down) === -->

  <!-- Front Wheel -->
  <rect x="55" y="8" width="10" height="20" rx="4" fill="#334155" />
  
  <!-- Back Wheel (Hidden mostly under the box, but sticks out slightly) -->
  <rect x="53" y="102" width="14" height="12" rx="4" fill="#334155" />

  <!-- Rear Engine/Chassis Base (Teal) -->
  <rect x="42" y="40" width="36" height="50" rx="8" fill="#21867A" />

  <!-- Front Fender -->
  <rect x="51" y="14" width="18" height="22" rx="9" fill="#2A9D8F" />

  <!-- Mirrors -->
  <!-- Left Mirror -->
  <line x1="38" y1="28" x2="28" y2="18" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" />
  <circle cx="26" cy="16" r="4" fill="#F8FAFC" />
  <!-- Right Mirror -->
  <line x1="82" y1="28" x2="92" y2="18" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" />
  <circle cx="94" cy="16" r="4" fill="#F8FAFC" />

  <!-- Front Console / Fairing (Teal) -->
  <rect x="36" y="24" width="48" height="22" rx="11" fill="#2A9D8F" />
  
  <!-- Windshield -->
  <path d="M 40,24 C 50,14 70,14 80,24" fill="none" stroke="#BAE6FD" stroke-width="5" stroke-linecap="round" opacity="0.6" />

  <!-- Headlight (Pointing forward/up) -->
  <circle cx="60" cy="20" r="5" fill="#F8FAFC" />
  <circle cx="60" cy="20" r="3" fill="#FFD166" />

  <!-- Handlebars -->
  <!-- Metal Bar -->
  <line x1="30" y1="36" x2="90" y2="36" stroke="#94A3B8" stroke-width="4" stroke-linecap="round" />
  <!-- Left Grip -->
  <rect x="25" y="33" width="12" height="6" rx="3" fill="#1E293B" transform="rotate(-15, 31, 36)" />
  <!-- Right Grip -->
  <rect x="83" y="33" width="12" height="6" rx="3" fill="#1E293B" transform="rotate(15, 89, 36)" />

  <!-- Delivery Hot-Box (Orange, at the back) -->
  <rect x="32" y="70" width="56" height="40" rx="6" fill="#F4A261" />
  <rect x="38" y="76" width="44" height="28" rx="4" fill="#E76F51" />
  
  <!-- Box Straps/Branding Details -->
  <rect x="58" y="70" width="4" height="40" fill="#FFFFFF" />
  <rect x="32" y="88" width="56" height="4" fill="#FFFFFF" />
  <!-- Center Logo Placeholder -->
  <circle cx="60" cy="90" r="6" fill="#2A9D8F" />
  <circle cx="60" cy="90" r="3" fill="#FFFFFF" />

  <!-- === THE RIDER (Top-Down) === -->

  <!-- Shoulders / Jacket (Red) -->
  <rect x="36" y="44" width="48" height="24" rx="12" fill="#E63946" />
  
  <!-- Arms reaching forward -->
  <!-- Left Arm -->
  <line x1="42" y1="56" x2="30" y2="38" stroke="#E63946" stroke-width="10" stroke-linecap="round" />
  <!-- Right Arm -->
  <line x1="78" y1="56" x2="90" y2="38" stroke="#E63946" stroke-width="10" stroke-linecap="round" />

  <!-- Hands / Gloves on the grips -->
  <circle cx="29" cy="38" r="4.5" fill="#1E293B" />
  <circle cx="91" cy="38" r="4.5" fill="#1E293B" />

  <!-- Helmet (Bright Yellow for map visibility) -->
  <circle cx="60" cy="52" r="16" fill="#FFD166" />
  
  <!-- Helmet Visor (Facing forward/up) -->
  <path d="M 48,46 C 48,36 72,36 72,46 Z" fill="#1E293B" />
  
  <!-- Helmet Glare/Shine -->
  <path d="M 52,58 A 8 8 0 0 0 68,58" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.8" stroke-linecap="round" />

</svg>