<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Floor Drop Shadow -->
  <ellipse cx="120" cy="190" rx="80" ry="14" fill="rgba(231,111,81,0.08)" />

  <!-- The Empty Plate -->
  <g transform="translate(0, -5)">
    <!-- Plate Outer Shadow -->
    <ellipse cx="120" cy="160" rx="80" ry="24" fill="rgba(71,85,105,0.05)" transform="translate(0, 8)" />
    <!-- Plate Outer Rim -->
    <ellipse cx="120" cy="160" rx="80" ry="24" fill="#FFFFFF" />
    <!-- Plate Inner Dip (Creates depth) -->
    <ellipse cx="120" cy="160" rx="60" ry="16" fill="#F1F5F9" />
    <!-- Plate Flat Bottom -->
    <ellipse cx="120" cy="162" rx="45" ry="12" fill="#FFFFFF" />
  </g>

  <!-- Floating 'X' Marks (Indicating no results/empty) -->
  <g transform="translate(50, 70) rotate(15)">
    <path d="M -8,-8 L 8,8 M -8,8 L 8,-8" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round" />
  </g>
  <g transform="translate(190, 80) rotate(45) scale(0.7)">
    <path d="M -8,-8 L 8,8 M -8,8 L 8,-8" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round" />
  </g>

  <!-- Floating Sparkle -->
  <g transform="translate(45, 130) rotate(-10) scale(0.6)">
    <path d="M 5,-10 Q 5,5 20,5 Q 5,5 5,20 Q 5,5 -10,5 Q 5,5 5,-10 Z" fill="rgba(255,209,102,0.3)" />
    <path d="M 0,-15 Q 0,0 15,0 Q 0,0 0,15 Q 0,0 -15,0 Q 0,0 0,-15 Z" fill="#FFD166" />
  </g>

  <!-- Floating Leaf -->
  <g transform="translate(185, 150) rotate(60) scale(0.7)">
    <path d="M 5,5 C 20,-15 40,-5 45,15 C 30,35 10,25 5,5 Z" fill="rgba(128,185,24,0.2)" />
    <path d="M 0,0 C 15,-20 35,-10 40,10 C 25,30 5,20 0,0 Z" fill="#80B918" />
  </g>

  <!-- Main Object: The Magnifying Glass -->
  <g transform="translate(110, 95) rotate(35)">
    <!-- Handle Shadow -->
    <rect x="-12" y="45" width="24" height="65" rx="12" fill="#E76F51" />
    <!-- Handle Top Highlight -->
    <rect x="-12" y="45" width="14" height="65" rx="7" fill="#F4A261" />
    
    <!-- Metal Connector -->
    <rect x="-16" y="36" width="32" height="14" rx="4" fill="#CBD5E1" />
    <rect x="-16" y="36" width="32" height="6" rx="3" fill="#94A3B8" />

    <!-- Lens Rim Shadow -->
    <circle cx="0" cy="0" r="48" fill="rgba(42,157,143,0.15)" transform="translate(-5, 8)" />
    <!-- Lens Outer Rim -->
    <circle cx="0" cy="0" r="48" fill="#2A9D8F" />
    <!-- Lens Inner Rim -->
    <circle cx="0" cy="0" r="38" fill="#FFF" />
    
    <!-- Lens Glass Background -->
    <circle cx="0" cy="0" r="38" fill="#F8FAFC" />

    <!-- The Question Mark (Straightened up by reversing the rotation) -->
    <g transform="rotate(-35)">
      <!-- Question Mark Drop Shadow -->
      <text x="0" y="18" fill="rgba(230,57,70,0.15)" font-family="sans-serif" font-weight="900" font-size="56" text-anchor="middle" transform="translate(-3, 4)">?</text>
      <!-- Solid Question Mark -->
      <text x="0" y="18" fill="#E63946" font-family="sans-serif" font-weight="900" font-size="56" text-anchor="middle">?</text>
    </g>

    <!-- Shiny Glass Glare / Reflection -->
    <path d="M -26,-24 A 34,34 0 0,1 18,-32" fill="none" stroke="#BAE6FD" stroke-width="6" stroke-linecap="round" opacity="0.6" />
    <circle cx="27" cy="-26" r="4" fill="#BAE6FD" opacity="0.6" />
  </g>
</svg>