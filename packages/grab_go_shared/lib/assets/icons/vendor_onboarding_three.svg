<svg viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
    <g transform="translate(15, -10)">
        <!-- DATA PIE CHART (Monitor Peak Times) -->
        <g transform="translate(55, 65)">
            <circle cx="0" cy="0" r="22" fill="#ffffff" stroke="#1e293b" stroke-width="3"/>
            <!-- 90 Degree Slice -->
            <path d="M 0 0 L 0 -22 A 22 22 0 0 1 22 0 Z" fill="#f59e0b" stroke="#1e293b" stroke-width="2" stroke-linejoin="round"/>
            <!-- 90 Degree Slice -->
            <path d="M 0 0 L 22 0 A 22 22 0 0 1 0 22 Z" fill="#00b14f" stroke="#1e293b" stroke-width="2" stroke-linejoin="round"/>
            <!-- 180 Degree Slice -->
            <path d="M 0 0 L 0 22 A 22 22 0 0 1 0 -22 Z" fill="#38bdf8" stroke="#1e293b" stroke-width="2" stroke-linejoin="round"/>
            <circle cx="0" cy="0" r="3" fill="#1e293b"/>
        </g>

        <!-- LARGE GROWTH CHART (Monitor Sales / Grow Confidence) -->
        <g transform="translate(85, 120)">
            <!-- Main Chart Board -->
            <rect x="0" y="0" width="120" height="90" rx="8" fill="#ffffff" stroke="#1e293b" stroke-width="3"/>
            <!-- Inner Box Area -->
            <rect x="15" y="15" width="90" height="60" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
            <!-- Grid Line -->
            <line x1="15" y1="45" x2="105" y2="45" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="3 3"/>
            
            <!-- Bar 1 -->
            <rect x="25" y="45" width="12" height="30" rx="2" fill="#38bdf8" stroke="#1e293b" stroke-width="2"/>
            <!-- Bar 2 -->
            <rect x="45" y="30" width="12" height="45" rx="2" fill="#38bdf8" stroke="#1e293b" stroke-width="2"/>
            <!-- Bar 3 -->
            <rect x="65" y="40" width="12" height="35" rx="2" fill="#f59e0b" stroke="#1e293b" stroke-width="2"/>
            <!-- Bar 4 (Highest) -->
            <rect x="85" y="10" width="12" height="65" rx="2" fill="#00b14f" stroke="#1e293b" stroke-width="2"/>

            <!-- Upward Trending Arrow -->
            <path d="M 15 50 L 45 20 L 65 30 L 100 -5" fill="none" stroke="#ef4444" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
            <!-- Arrow Head -->
            <path d="M 85 -5 L 100 -5 L 100 10" fill="none" stroke="#ef4444" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        </g>

        <!-- STAR BADGE (Service Quality) -->
        <g transform="translate(240, 230)">
            <circle cx="0" cy="0" r="28" fill="#ffffff" stroke="#1e293b" stroke-width="3"/>
            <!-- Golden Star -->
            <path d="M 0 -13 L 4 -4 L 14 -3 L 6 4 L 9 14 L 0 9 L -9 14 L -6 4 L -14 -3 L -4 -4 Z" fill="#fbbf24" stroke="#1e293b" stroke-width="2.5" stroke-linejoin="round"/>
            <!-- Sparkles -->
            <path d="M -22 -16 L -16 -16 M -19 -19 L -19 -13" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M 18 16 L 24 16 M 21 13 L 21 19" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
        </g>

        <!-- Tiny Decorative Dots Floating -->
        <circle cx="80" cy="230" r="4" fill="#ef4444"/>
        <circle cx="250" cy="90" r="3" fill="#38bdf8"/>
        <circle cx="140" cy="40" r="4" fill="#00b14f"/>
    </g>
</svg>