<svg viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
    <!-- Connecting Dashed Lines (4 corners) -->
    <path d="M120 120 L50 50" stroke="#94a3b8" stroke-width="3" stroke-dasharray="6 6" stroke-linecap="round"/>
    <path d="M120 120 L190 50" stroke="#94a3b8" stroke-width="3" stroke-dasharray="6 6" stroke-linecap="round"/>
    <path d="M120 120 L50 190" stroke="#94a3b8" stroke-width="3" stroke-dasharray="6 6" stroke-linecap="round"/>
    <path d="M120 120 L190 190" stroke="#94a3b8" stroke-width="3" stroke-dasharray="6 6" stroke-linecap="round"/>

    <!-- Central Workspace (Device) -->
    <!-- Device Body -->
    <rect x="85" y="65" width="70" height="110" rx="10" fill="#ffffff" stroke="#1e293b" stroke-width="3"/>
    
    <!-- App Content Layout inside Screen -->
    <!-- 2 Rows of Service Grid -->
    <rect x="95" y="75" width="20" height="20" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <circle cx="105" cy="85" r="5" fill="#f59e0b" opacity="0.8"/>
    
    <rect x="125" y="75" width="20" height="20" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <circle cx="135" cy="85" r="5" fill="#22c55e" opacity="0.8"/>
    
    <rect x="95" y="100" width="20" height="20" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <circle cx="105" cy="110" r="5" fill="#38bdf8" opacity="0.8"/>
    
    <rect x="125" y="100" width="20" height="20" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <circle cx="135" cy="110" r="5" fill="#d97706" opacity="0.8"/>
    
    <!-- Chart Box -->
    <rect x="95" y="125" width="50" height="40" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <!-- Chart Bars -->
    <rect x="101" y="148" width="6" height="12" rx="1" fill="#38bdf8"/>
    <rect x="113" y="140" width="6" height="20" rx="1" fill="#00b14f"/>
    <rect x="125" y="133" width="6" height="27" rx="1" fill="#f59e0b"/>
    <rect x="137" y="144" width="6" height="16" rx="1" fill="#ef4444"/>

    <!-- Top Left Node: Food Service -->
    <g transform="translate(50, 50)">
        <circle cx="0" cy="0" r="24" fill="#ffffff" stroke="#1e293b" stroke-width="3"/>
        <!-- Burger Icon -->
        <path d="M-12 -4 C-12 -12, 12 -12, 12 -4 Z" fill="#f59e0b" stroke="#1e293b" stroke-width="2" stroke-linejoin="round"/>
        <path d="M-14 0 L14 0" stroke="#00b14f" stroke-width="3" stroke-linecap="round"/>
        <rect x="-12" y="4" width="24" height="4" rx="2" fill="#78350f" stroke="#1e293b" stroke-width="1.5"/>
        <path d="M-12 12 C-12 18, 12 18, 12 12 Z" fill="#f59e0b" stroke="#1e293b" stroke-width="2" stroke-linejoin="round"/>
    </g>

    <!-- Top Right Node: Groceries -->
    <g transform="translate(190, 50)">
        <circle cx="0" cy="0" r="24" fill="#ffffff" stroke="#1e293b" stroke-width="3"/>
        <!-- Basket Icon -->
        <path d="M-10,-2 C-10,-10 10,-10 10,-2" fill="none" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="-3" cy="-1" r="4" fill="#ef4444" stroke="#1e293b" stroke-width="1.5"/> <!-- Apple -->
        <path d="M2,2 L10,-6" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/> <!-- Leaves -->
        <polygon points="-12,-2 12,-2 8,12 -8,12" fill="#fbbf24" stroke="#1e293b" stroke-width="2" stroke-linejoin="round"/>
        <line x1="-5" y1="2" x2="-3" y2="9" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="5" y1="2" x2="3" y2="9" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- Bottom Left Node: Pharmacy -->
    <g transform="translate(50, 190)">
        <circle cx="0" cy="0" r="24" fill="#ffffff" stroke="#1e293b" stroke-width="3"/>
        <!-- Pill Capsule Icon -->
        <g transform="rotate(45)">
            <rect x="-6" y="-12" width="12" height="24" rx="6" fill="#f8fafc" stroke="#1e293b" stroke-width="2"/>
            <path d="M-6 0 L6 0 L6 6 C6 9.3 3.3 12 0 12 C-3.3 12 -6 9.3 -6 6 Z" fill="#38bdf8" stroke="#1e293b" stroke-width="2"/>
            <line x1="-2" y1="-8" x2="-2" y2="-3" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
        </g>
    </g>

    <!-- Bottom Right Node: Supermarket -->
    <g transform="translate(190, 190)">
        <circle cx="0" cy="0" r="24" fill="#ffffff" stroke="#1e293b" stroke-width="3"/>
        <!-- Shopping Cart Icon -->
        <path d="M-12 -6 L-7 -6 L-3 5" fill="none" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <polygon points="-5,-2 11,-2 8,5 -3,5" fill="#d97706" stroke="#1e293b" stroke-width="2" stroke-linejoin="round"/>
        <line x1="-4" y1="1.5" x2="9.5" y2="1.5" stroke="#1e293b" stroke-width="1.5"/>
        <line x1="3" y1="-2" x2="2.5" y2="5" stroke="#1e293b" stroke-width="1.5"/>
        <circle cx="-1" cy="10" r="2.5" fill="#1e293b"/>
        <circle cx="6" cy="10" r="2.5" fill="#1e293b"/>
    </g>

    <!-- Small Decorative Elements floating in space -->
    <circle cx="120" cy="20" r="4" fill="#fbbf24"/>
    <circle cx="120" cy="220" r="3" fill="#38bdf8"/>
    <circle cx="20" cy="120" r="4" fill="#f43f5e"/>
    <circle cx="220" cy="120" r="5" fill="#22c55e"/>
</svg>