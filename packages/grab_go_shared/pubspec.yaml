name: grab_go_shared
description: "Shared components and utilities for GrabGo apps."
version: 0.0.1
homepage: https://github.com/yourusername/grabgo
resolution: workspace

environment:
  sdk: ^3.10.0-290.4
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.5+1
  shared_preferences: ^2.5.3
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  cached_network_image: ^3.4.1
  flutter_screenutil: ^5.9.3
  animations: ^2.0.11
  flutter_spinkit: ^5.2.2
  animated_text_kit: ^4.2.3
  dio: ^5.9.0
  flutter_svg: ^2.2.1
  shimmer: ^3.0.0
  intl: ^0.20.2
  flutter_gen: ^5.12.0
  path_provider: ^2.1.4
  crypto: ^3.0.5
  get_it: ^9.0.5
  firebase_core: 3.15.2
  firebase_auth: 5.3.3
  firebase_app_check: 0.2.1+2
  go_router: ^16.2.4
  http: ^1.1.2
  chopper: ^8.4.0
  fluttertoast: ^9.0.0
  flutter_image_slideshow: ^0.1.6
  image_picker: ^1.2.0
  flutter_image_compress: ^2.3.0
  photo_manager: ^3.6.0
  photo_manager_image_provider: ^2.1.1
  google_fonts: ^6.3.2
  google_sign_in: ^7.2.0
  json_annotation: ^4.9.0
  record: ^5.1.2
  audioplayers: ^6.1.0
  permission_handler: ^11.3.1
  emoji_picker_flutter: ^4.4.0
  flutter_blurhash: ^0.8.2
  file_picker: ^10.3.3
  firebase_messaging: any
  flutter_local_notifications: ^18.0.1
  flutter_app_badge_control: ^0.0.2
  socket_io_client: ^2.0.3+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_gen_runner: ^5.4.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  chopper_generator: ^8.4.0

flutter:
  assets:
    - lib/assets/images/
    - lib/assets/icons/
    - lib/assets/lottie/
    - lib/assets/fonts/

  fonts:
    - family: Lato
      fonts:
        - asset: lib/assets/fonts/Lato-Regular.ttf
          weight: 400
        - asset: lib/assets/fonts/Lato-Light.ttf
          weight: 300
        - asset: lib/assets/fonts/Lato-Bold.ttf
          weight: 700
    - family: Lobster
      fonts:
        - asset: lib/assets/fonts/Lobster-Regular.ttf
          weight: 400
