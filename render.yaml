services:
  - type: web
    name: grabgo-admin
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm && pnpm install && cd web/apps/admin && pnpm build
    startCommand: cd web/apps/admin && pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      # Add your environment variables in Render dashboard
      # Examples (uncomment and set in Render):
      # - key: NEXT_PUBLIC_API_URL
      #   sync: false
      # - key: NEXT_PUBLIC_FIREBASE_API_KEY
      #   sync: false
