  # ============ ORDERS ============
  /orders:
    get:
      tags: [Orders]
      summary: Get orders for current user
      description: Returns orders based on user role (customer, restaurant, or rider)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Orders retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Order"

    post:
      tags: [Orders]
      summary: Create a new order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items, paymentMethod]
              properties:
                restaurant:
                  type: string
                  description: Vendor ID (restaurant/store/pharmacy/grabmart)
                fulfillmentMode:
                  type: string
                  enum: [delivery, pickup]
                deliveryTimeType:
                  type: string
                  enum: [asap, scheduled]
                scheduledForAt:
                  type: string
                  format: date-time
                items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [food, quantity]
                    properties:
                      food:
                        type: string
                        description: Food ID
                      quantity:
                        type: integer
                        minimum: 1
                deliveryAddress:
                  type: string
                paymentMethod:
                  type: string
                  enum: [cash, card]
                pickupContactName:
                  type: string
                pickupContactPhone:
                  type: string
                acceptNoShowPolicy:
                  type: boolean
                isGiftOrder:
                  type: boolean
                giftRecipientName:
                  type: string
                giftRecipientPhone:
                  type: string
                giftNote:
                  type: string
                useCredits:
                  type: boolean
                notes:
                  type: string
                orderNumber:
                  type: string
      responses:
        "201":
          description: Order created successfully
        "400":
          description: Validation error
        "404":
          description: Restaurant or food not found

