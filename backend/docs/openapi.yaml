  # ============ STATUSES ============
  /statuses:
    get:
      tags: [Statuses]
      summary: Get all active statuses
      description: Retrieve active statuses with optional filtering by category, restaurant, or recommended
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [daily_special, discount, new_item, video]
          description: Filter by status category
        - name: restaurant
          in: query
          schema:
            type: string
          description: Filter by restaurant ID
        - name: recommended
          in: query
          schema:
            type: boolean
          description: Filter recommended statuses only
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Statuses retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Status'
                  pagination:
                    type: object
                    properties:
                      currentPage:
                        type: integer
                      totalPages:
                        type: integer
                      totalItems:
                        type: integer

    post:
      tags: [Statuses]
      summary: Create a new status
      description: Create a new status/story (restaurant or admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [restaurant, category, media]
              properties:
                restaurant:
                  type: string
                  description: Restaurant ID
                category:
                  type: string
                  enum: [daily_special, discount, new_item, video]
                title:
                  type: string
                  maxLength: 100
                description:
                  type: string
                  maxLength: 500
                media:
                  type: string
                  format: binary
                  description: Image or video file
                mediaType:
                  type: string
                  enum: [image, video]
                  default: image
                discountPercentage:
                  type: number
                  minimum: 0
                  maximum: 100
                promoCode:
                  type: string
                linkedFood:
                  type: string
                  description: Food item ID to link
                isRecommended:
                  type: boolean
                durationHours:
                  type: integer
                  minimum: 1
                  maximum: 168
                  default: 24
                  description: How long the status stays active (1-168 hours)
      responses:
        '201':
          description: Status created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Status'
        '400':
          description: Validation error
        '404':
          description: Restaurant or linked food not found

