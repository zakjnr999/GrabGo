                  format: binary
                phoneNumber:
                  type: string
                isPhoneVerified:
                  type: boolean
          application/json:
            schema:
              type: object
              properties:
                phoneNumber:
                  type: string
                isPhoneVerified:
                  type: boolean
                profilePicture:
                  type: string
      responses:
