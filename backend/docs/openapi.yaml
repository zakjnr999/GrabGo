openapi: 3.0.3
info:
  title: GrabGo API
  description: |
    Backend API for GrabGo food delivery platform.
    
    ## Authentication
    Most endpoints require JWT authentication. Include the token in the Authorization header:
    ```
    Authorization: Bearer <your_jwt_token>
    ```
    
    ## User Roles
    - **customer**: Regular users who order food
    - **restaurant**: Restaurant owners/managers
    - **rider**: Delivery riders
    - **admin**: Platform administrators
  version: 1.0.0
  contact:
    name: GrabGo Support
  license:
    name: ISC

servers:
  - url: http://localhost:5000/api
    description: Development server
  - url: https://api.grabgo.com/api
    description: Production server

tags:
  - name: Users
    description: User authentication and profile management
  - name: Restaurants
    description: Restaurant registration and management
  - name: Foods
    description: Food items management
  - name: Categories
    description: Food categories
  - name: Orders
    description: Order management
  - name: Payments
    description: Payment processing (MTN MOMO)
  - name: Riders
    description: Rider operations and wallet
  - name: Chats
    description: Real-time chat between customers and riders
  - name: Statuses
    description: Restaurant stories and status updates (daily specials, discounts, new items, videos)
  - name: Notifications
    description: In-app notifications for users
  - name: Referrals
    description: Referral system for user acquisition
  - name: Promotions
    description: Promotional banners and campaigns
  - name: Notification Settings
    description: User notification preferences
  - name: Scheduled Notifications
    description: Schedule notifications to be sent at specific future times (Admin only)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from login/register endpoints

  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
          example: "507f1f77bcf86cd799439011"
        username:
          type: string
          example: "johndoe"
        email:
          type: string
          format: email
          example: "john@example.com"
        phone:
          type: string
          example: "+233201234567"
        isPhoneVerified:
          type: boolean
        isEmailVerified:
          type: boolean
        DateOfBirth:
          type: string
          format: date
        profilePicture:
          type: string
          format: uri
        isAdmin:
          type: boolean
        role:
          type: string
          enum: [customer, restaurant, rider, admin]
        isActive:
          type: boolean
        permissions:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    Restaurant:
      type: object
      properties:
        _id:
          type: string
        restaurant_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        address:
          type: string
        city:
          type: string
        logo:
          type: string
          format: uri
        food_type:
          type: string
        description:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        average_delivery_time:
          type: string
        delivery_fee:
          type: number
        min_order:
          type: number
        status:
          type: string
          enum: [pending, approved, rejected, suspended]
        rating:
          type: number
        is_open:
          type: boolean
        total_reviews:
          type: integer

    Food:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          $ref: '#/components/schemas/Category'
        restaurant:
          $ref: '#/components/schemas/Restaurant'
        food_image:
          type: string
          format: uri
        isAvailable:
          type: boolean
        ingredients:
          type: array
          items:
            type: string
        rating:
          type: number
        totalReviews:
          type: integer

    Category:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        description:
          type: string
        emoji:
          type: string
        isActive:
          type: boolean

    Order:
      type: object
      properties:
        _id:
          type: string
        orderNumber:
          type: string
        customer:
          $ref: '#/components/schemas/User'
        restaurant:
          $ref: '#/components/schemas/Restaurant'
        rider:
          $ref: '#/components/schemas/User'
        items:
          type: array
          items:
            type: object
            properties:
              food:
                type: string
              name:
                type: string
              quantity:
                type: integer
              price:
                type: number
              image:
                type: string
        subtotal:
          type: number
        deliveryFee:
          type: number
        tax:
          type: number
        totalAmount:
          type: number
        deliveryAddress:
          type: string
        paymentMethod:
          type: string
          enum: [cash, card, mobile_money, mtn_momo, online]
        paymentStatus:
          type: string
          enum: [pending, paid, failed]
        status:
          type: string
          enum: [pending, confirmed, preparing, ready, picked_up, on_the_way, delivered, cancelled]
        notes:
          type: string
        createdAt:
          type: string
          format: date-time

    Payment:
      type: object
      properties:
        _id:
          type: string
        referenceId:
          type: string
        order:
          type: string
        customer:
          type: string
        paymentMethod:
          type: string
        provider:
          type: string
        amount:
          type: number
        currency:
          type: string
        phoneNumber:
          type: string
        status:
          type: string
          enum: [pending, processing, successful, failed, cancelled]

    Chat:
      type: object
      properties:
        id:
          type: string
        orderId:
          type: string
        orderNumber:
          type: string
        otherUser:
          type: object
          properties:
            id:
              type: string
            username:
              type: string
            role:
              type: string
        lastMessage:
          type: string
        lastMessageType:
          type: string
        lastMessageAt:
          type: string
          format: date-time
        unreadCount:
          type: integer

    Message:
      type: object
      properties:
        _id:
          type: string
        sender:
          type: string
        text:
          type: string
        messageType:
          type: string
          enum: [text, voice, image]
        audioUrl:
          type: string
        audioDuration:
          type: number
        imageUrls:
          type: array
          items:
            type: string
        readBy:
          type: array
          items:
            type: string
        isEdited:
          type: boolean
        createdAt:
          type: string
          format: date-time

    RiderWallet:
      type: object
      properties:
        balance:
          type: number
        totalEarnings:
          type: number
        totalWithdrawals:
          type: number
        pendingWithdrawals:
          type: number

    Status:
      type: object
      properties:
        _id:
          type: string
        restaurant:
          $ref: '#/components/schemas/Restaurant'
        category:
          type: string
          enum: [daily_special, discount, new_item, video]
          description: |
            - daily_special: Today's special dishes
            - discount: Promotional discounts
            - new_item: New menu items
            - video: Video stories
        title:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 500
        mediaType:
          type: string
          enum: [image, video]
        mediaUrl:
          type: string
          format: uri
        thumbnailUrl:
          type: string
          format: uri
        blurHash:
          type: string
        discountPercentage:
          type: number
          minimum: 0
          maximum: 100
        promoCode:
          type: string
        linkedFood:
          $ref: '#/components/schemas/Food'
        viewCount:
          type: integer
        likeCount:
          type: integer
        totalViewDuration:
          type: integer
          description: Total view duration in milliseconds
        avgViewDuration:
          type: integer
          description: Average view duration in milliseconds
        engagementScore:
          type: number
          description: Calculated engagement score (views + likes*2 + duration factor)
        isActive:
          type: boolean
        isRecommended:
          type: boolean
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    Story:
      type: object
      description: Aggregated story data for a restaurant (for story ring display)
      properties:
        restaurantId:
          type: string
        restaurantName:
          type: string
        logo:
          type: string
          format: uri
        statusCount:
          type: integer
          description: Number of active statuses
        categories:
          type: array
          items:
            type: string
            enum: [daily_special, discount, new_item, video]
        totalViews:
          type: integer
          description: Total views across all statuses
        totalLikes:
          type: integer
          description: Total likes across all statuses
        totalEngagement:
          type: number
          description: Total engagement score
        latestStatusAt:
          type: string
          format: date-time
        latestCategory:
          type: string

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        error:
          type: string

    Success:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string

    ScheduledNotification:
      type: object
      properties:
        _id:
          type: string
          example: "507f1f77bcf86cd799439011"
        scheduledFor:
          type: string
          format: date-time
          description: When to send the notification
        timezone:
          type: string
          default: UTC
          example: "Africa/Accra"
        status:
          type: string
          enum: [pending, sent, cancelled, failed]
          description: Current status of the scheduled notification
        type:
          type: string
          enum: [order, promo, update, system, comment_reply, comment_reaction, referral_completed, payment_confirmed, delivery_arriving, milestone_bonus]
          description: Type of notification
        title:
          type: string
          maxLength: 200
          example: "Flash Sale!"
        message:
          type: string
          maxLength: 500
          example: "Get 50% off all orders for the next hour!"
        data:
          type: object
          description: Additional data for deep linking
          properties:
            route:
              type: string
            promoCode:
              type: string
        targetType:
          type: string
          enum: [user, segment, all]
          description: Who should receive this notification
        targetUsers:
          type: array
          items:
            type: string
          description: Specific user IDs (when targetType is 'user')
        targetSegment:
          type: object
          description: Segment criteria (when targetType is 'segment')
          properties:
            inactive:
              type: boolean
            daysSinceLastOrder:
              type: integer
            newUsers:
              type: boolean
            registeredWithinDays:
              type: integer
        isRecurring:
          type: boolean
          default: false
        recurrencePattern:
          type: object
          properties:
            frequency:
              type: string
              enum: [daily, weekly, monthly]
            timeOfDay:
              type: string
              example: "12:00"
            endDate:
              type: string
              format: date-time
        createdBy:
          type: string
          description: Admin user who created this
        sentAt:
          type: string
          format: date-time
        failureReason:
          type: string
        retryCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Notification:
      type: object
      properties:
        _id:
          type: string
        user:
          type: string
        type:
          type: string
          enum: [order, promo, update, system, comment_reply, comment_reaction, referral_completed, payment_confirmed, delivery_arriving, milestone_bonus]
        title:
          type: string
        message:
          type: string
        isRead:
          type: boolean
        data:
          type: object
        actors:
          type: array
          items:
            type: object
            properties:
              actorId:
                type: string
              actorName:
                type: string
              actorAvatar:
                type: string
        actorCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    ReferralCode:
      type: object
      properties:
        code:
          type: string
          example: "ABC12345"
        shareUrl:
          type: string
          example: "https://grabgo.app/r/ABC12345"
        totalReferrals:
          type: integer
        completedReferrals:
          type: integer
        pendingReferrals:
          type: integer
        totalEarned:
          type: number
        availableCredit:
          type: string

    Referral:
      type: object
      properties:
        id:
          type: string
        refereeName:
          type: string
        status:
          type: string
          enum: [pending_order, completed, expired]
        creditEarned:
          type: number
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    UserCredit:
      type: object
      properties:
        id:
          type: string
        amount:
          type: number
        source:
          type: string
          enum: [referral_received, referral_earned, promo, milestone_bonus]
        expiresAt:
          type: string
          format: date-time
        description:
          type: string

    PromotionalBanner:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        subtitle:
          type: string
        imageUrl:
          type: string
          format: uri
        targetUrl:
          type: string
        targetScreen:
          type: string
        priority:
          type: integer
        isActive:
          type: boolean
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    NotificationSettings:
      type: object
      properties:
        chatMessages:
          type: boolean
          default: true
        orderUpdates:
          type: boolean
          default: true
        promoNotifications:
          type: boolean
          default: true
        commentReplies:
          type: boolean
          default: true
        commentReactions:
          type: boolean
          default: true
        referralUpdates:
          type: boolean
          default: true
        paymentUpdates:
          type: boolean
          default: true
        deliveryUpdates:
          type: boolean
          default: true
        systemUpdates:
          type: boolean
          default: true

paths:
  # ============ USERS ============
  /users:
    post:
      tags: [Users]
      summary: Register a new user
      description: Register a new user (regular or Google sign-up)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - title: Regular Registration
                  type: object
                  required: [username, email, password]
                  properties:
                    username:
                      type: string
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                      minLength: 6
                    DateOfBirth:
                      type: string
                      format: date
                    phone:
                      type: string
                    profilePicture:
                      type: string
                    role:
                      type: string
                      enum: [customer, restaurant, rider, admin]
                - title: Google Registration
                  type: object
                  required: [googleId, email, displayName]
                  properties:
                    googleId:
                      type: string
                    email:
                      type: string
                      format: email
                    displayName:
                      type: string
                    photoUrl:
                      type: string
                    role:
                      type: string
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
                  token:
                    type: string
        '400':
          description: Validation error or user already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/login:
    post:
      tags: [Users]
      summary: Login user
      description: Login with email/password or Google credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - title: Regular Login
                  type: object
                  required: [email, password]
                  properties:
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                - title: Google Login
                  type: object
                  required: [googleId, email]
                  properties:
                    googleId:
                      type: string
                    email:
                      type: string
                    displayName:
                      type: string
                    photoUrl:
                      type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
                  token:
                    type: string
        '401':
          description: Invalid credentials
        '403':
          description: Account deactivated

  /users/{userId}:
    get:
      tags: [Users]
      summary: Get user by ID
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '404':
          description: User not found

    put:
      tags: [Users]
      summary: Update user
      description: Update user profile (phone, profile picture, etc.)
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                profilePicture:
                  type: string
                  format: binary
                phoneNumber:
                  type: string
                isPhoneVerified:
                  type: boolean
          application/json:
            schema:
              type: object
              properties:
                phoneNumber:
                  type: string
                isPhoneVerified:
                  type: boolean
                profilePicture:
                  type: string
      responses:
        '200':
          description: User updated successfully
        '403':
          description: Not authorized
        '404':
          description: User not found

  /users/verify-email:
    post:
      tags: [Users]
      summary: Verify email with OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp]
              properties:
                email:
                  type: string
                  format: email
                otp:
                  type: string
                  minLength: 6
                  maxLength: 6
      responses:
        '200':
          description: Email verified successfully
        '400':
          description: Invalid or expired OTP

  /users/resend-verification:
    post:
      tags: [Users]
      summary: Resend email verification OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Verification email sent

  /users/send-verification:
    post:
      tags: [Users]
      summary: Send verification email (authenticated)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Verification email sent
        '400':
          description: Email already verified

  /users/send-phone-otp:
    post:
      tags: [Users]
      summary: Send OTP to phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phoneNumber, userId]
              properties:
                phoneNumber:
                  type: string
                userId:
                  type: string
                channel:
                  type: string
                  enum: [sms, whatsapp]
      responses:
        '200':
          description: OTP sent successfully
        '400':
          description: Phone already verified
        '404':
          description: User not found

  /users/verify-phone-otp:
    post:
      tags: [Users]
      summary: Verify phone OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phoneNumber, otp, userId]
              properties:
                phoneNumber:
                  type: string
                otp:
                  type: string
                userId:
                  type: string
      responses:
        '200':
          description: Phone verified successfully
        '400':
          description: Invalid or expired OTP

  /users/fcm-token:
    post:
      tags: [Users]
      summary: Register FCM token for push notifications
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Token registered successfully

  # ============ RESTAURANTS ============
  /restaurants:
    get:
      tags: [Restaurants]
      summary: Get all restaurants
      description: Returns approved restaurants (or all for admins)
      responses:
        '200':
          description: Restaurants retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Restaurant'

  /restaurants/register:
    post:
      tags: [Restaurants]
      summary: Register a new restaurant
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, email, phone, address, city, owner_full_name, owner_contact_number, business_id_number, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                phone:
                  type: string
                address:
                  type: string
                city:
                  type: string
                owner_full_name:
                  type: string
                owner_contact_number:
                  type: string
                business_id_number:
                  type: string
                password:
                  type: string
                  minLength: 6
                logo:
                  type: string
                  format: binary
                business_id_photo:
                  type: string
                  format: binary
                owner_photo:
                  type: string
                  format: binary
      responses:
        '201':
          description: Restaurant registered, pending approval
        '400':
          description: Validation error or restaurant exists

  /restaurants/{restaurantId}:
    get:
      tags: [Restaurants]
      summary: Get restaurant by ID
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Restaurant retrieved successfully
        '404':
          description: Restaurant not found

    put:
      tags: [Restaurants]
      summary: Update restaurant status (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [pending, approved, rejected, suspended]
      responses:
        '200':
          description: Status updated successfully
        '400':
          description: Invalid status
        '404':
          description: Restaurant not found

  # ============ FOODS ============
  /foods:
    get:
      tags: [Foods]
      summary: Get all foods
      parameters:
        - name: restaurant
          in: query
          schema:
            type: string
          description: Filter by restaurant ID
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category ID
        - name: isAvailable
          in: query
          schema:
            type: boolean
          description: Filter by availability
      responses:
        '200':
          description: Foods retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Food'

    post:
      tags: [Foods]
      summary: Create a new food item
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, price, category, restaurant]
              properties:
                name:
                  type: string
                description:
                  type: string
                price:
                  type: number
                category:
                  type: string
                restaurant:
                  type: string
                food_image:
                  type: string
                  format: binary
                isAvailable:
                  type: boolean
                ingredients:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Food created successfully
        '404':
          description: Category or restaurant not found

  /foods/{foodId}:
    get:
      tags: [Foods]
      summary: Get food by ID
      parameters:
        - name: foodId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Food retrieved successfully
