    get:
      tags: [Orders]
      summary: Get order by ID
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order retrieved successfully
        "403":
          description: Not authorized
        "404":
          description: Order not found

  /orders/{orderId}/status:
    put:
      tags: [Orders]
      summary: Update order status
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum:
                    [
                      pending,
                      confirmed,
                      preparing,
                      ready,
                      picked_up,
                      on_the_way,
                      delivered,
                      cancelled,
                    ]
                cancellationReason:
                  type: string
                deliveryVerification:
                  type: object
                  properties:
                    method:
                      type: string
                      enum: [code, authorized_photo]
                    code:
                      type: string
                    photoUrl:
                      type: string
                      format: uri
                    reason:
                      type: string
                    contactAttempted:
                      type: boolean
      responses:
        "200":
          description: Status updated successfully
