                  type: string
                nationalIdNumber:
                  type: string
                paymentMethod:
                  type: string
                  enum: [bank_transfer, mobile_money]
                bankName:
                  type: string
                accountNumber:
                  type: string
                mobileMoneyProvider:
                  type: string
                mobileMoneyNumber:
                  type: string
                vehicleImage:
                  type: string
                  format: binary
      responses:
        "200":
          description: Verification data updated

  /riders/verification/upload-id:
    post:
      tags: [Riders]
      summary: Upload ID images
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [imageType, idImage]
              properties:
                imageType:
                  type: string
                  enum: [front, back, selfie]
                idImage:
                  type: string
                  format: binary
      responses:
        "200":
          description: Image uploaded successfully
        "400":
          description: Invalid image type or no image

  /riders/verification/status/{riderId}:
    put:
      tags: [Riders]
      summary: Update verification status (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: riderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [pending, under_review, approved, rejected]
                rejectionReason:
                  type: string
      responses:
        "200":
          description: Status updated successfully
        "404":
          description: Rider not found

  # ============ RIDER PARTNER SYSTEM ============

  /riders/partner-profile/dashboard:
    get:
      tags: [Rider Partner]
      summary: Get partner dashboard
      description: |
        Returns the rider's full partner dashboard including current level, score,
        performance metrics, next level target, perks, and recent level history.
        Requires `RIDER_PARTNER_SYSTEM_ENABLED` feature flag.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Partner dashboard retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      profile:
                        type: object
                        properties:
                          riderId:
                            type: string
                          partnerLevel:
                            $ref: "#/components/schemas/PartnerLevel"
                          partnerScore:
                            type: number
                          lastEvaluatedAt:
                            type: string
                            format: date-time
                      level:
                        type: object
                        properties:
                          current:
                            $ref: "#/components/schemas/PartnerLevel"
                          multiplier:
                            type: number
                            example: 1.2
                          dispatchBonus:
                            type: integer
                            example: 6
                          isLocked:
                            type: boolean
                          lockDaysRemaining:
                            type: integer
                      metrics:
                        type: object
                        properties:
                          onTimeRate:
                            type: number
                          completionRate:
                            type: number
                          customerRating:
                            type: number
                          deliveryVolume:
                            type: integer
                          acceptanceRate:
                            type: number
                      nextLevel:
                        $ref: "#/components/schemas/NextLevelTarget"
                      recentHistory:
                        type: array
                        items:
                          $ref: "#/components/schemas/LevelChange"
        "403":
          description: Feature not enabled

  /riders/partner-profile/score-breakdown:
    get:
      tags: [Rider Partner]
      summary: Get score breakdown
      description: |
        Returns the detailed score computation for a rider — individual component
        scores (on-time, completion, rating, volume, acceptance) and weights.
        Admins can view any rider via `riderId` query param.
      security:
        - bearerAuth: []
      parameters:
        - name: riderId
          in: query
          description: Target rider ID (admin only)
          schema:
            type: string
      responses:
        "200":
          description: Score breakdown retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      riderId:
                        type: string
                      windowStart:
                        type: string
                        format: date-time
                      windowEnd:
                        type: string
                        format: date-time
                      windowDays:
                        type: integer
                        example: 28
                      partnerScore:
                        type: number
                      components:
                        type: object
                        description: Individual weighted score components

  /riders/partner-profile/level-history:
    get:
      tags: [Rider Partner]
      summary: Get level history
      description: |
        Returns the rider's partner level change history (upgrades and downgrades).
        Admins can view any rider via `riderId` query param.
      security:
        - bearerAuth: []
      parameters:
        - name: riderId
          in: query
          description: Target rider ID (admin only)
          schema:
            type: string
        - name: limit
          in: query
          description: Number of records to return (max 100)
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Level history retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LevelChange"

  /riders/partner-profile/recalculate:
    post:
      tags: [Rider Partner]
      summary: Force-recalculate rider level (Admin)
      description: |
        Triggers an immediate level recalculation for a specific rider.
        Admin only endpoint.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [riderId]
              properties:
                riderId:
                  type: string
                  description: The rider's user ID
      responses:
        "200":
          description: Recalculation complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      previousLevel:
                        $ref: "#/components/schemas/PartnerLevel"
                      effectiveLevel:
                        $ref: "#/components/schemas/PartnerLevel"
                      levelChanged:
                        type: boolean
                      partnerScore:
                        type: number
                      components:
                        type: object
        "403":
          description: Admin only

  /riders/partner-profile/level-distribution:
    get:
      tags: [Rider Partner]
      summary: Get level distribution (Admin)
      description: |
        Returns the distribution of riders across all partner levels.
        Useful for admin dashboards and monitoring.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Level distribution retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      total:
                        type: integer
                      levels:
                        type: array
                        items:
                          type: object
                          properties:
                            level:
                              $ref: "#/components/schemas/PartnerLevel"
                            count:
                              type: integer
                            avgScore:
                              type: number
                            percentage:
                              type: number

  # ============ RIDER INCENTIVES ============

  /riders/quests:
    get:
      tags: [Rider Incentives]
      summary: Get active quests
      description: |
        Returns the rider's active daily and weekly quests with progress tracking.
        Quest rewards are multiplied by the rider's partner level multiplier.
        Requires `RIDER_INCENTIVES_ENABLED` feature flag.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Quest dashboard retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/QuestProgress"

  /riders/streaks:
    get:
      tags: [Rider Incentives]
      summary: Get streak status
      description: |
        Returns the rider's consecutive-day delivery streak, including current
        count, longest streak, next reward threshold, and recent streak rewards.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Streak data retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/StreakDashboard"

  /riders/milestones:
    get:
      tags: [Rider Incentives]
      summary: Get milestone progress
      description: |
        Returns the rider's lifetime delivery milestones with progress,
        badge info, completion status, and recent milestone rewards.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Milestone dashboard retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/MilestoneDashboard"

  /riders/incentives:
    get:
      tags: [Rider Incentives]
      summary: Get incentive ledger
      description: |
        Returns the rider's incentive ledger entries for a given period,
        grouped by source type (quest, streak, milestone, peak_hour).
      security:
        - bearerAuth: []
      parameters:
        - name: period
          in: query
          description: Window key (e.g. "2026-W10", "2026-03-05"). Defaults to current week.
          schema:
            type: string
      responses:
        "200":
          description: Incentive summary retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/IncentiveSummary"

  /riders/incentives/admin/{riderId}:
    get:
      tags: [Rider Incentives]
      summary: Get rider incentive ledger (Admin)
      description: |
        Admin view of a specific rider's incentive ledger. Same response
        shape as the rider-facing `/incentives` endpoint.
      security:
        - bearerAuth: []
      parameters:
        - name: riderId
          in: path
          required: true
          schema:
            type: string
        - name: period
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Incentive summary retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/IncentiveSummary"

  /riders/peak-hours/status:
    get:
      tags: [Rider Incentives]
      summary: Get current peak-hour status
      description: |
        Returns whether the current time is within a peak-hour window,
        active bonus rates, and the next upcoming window.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Peak-hour status retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      isPeakHour:
                        type: boolean
                      activeWindows:
                        type: array
                        items:
                          $ref: "#/components/schemas/PeakWindow"
                      nextWindow:
                        allOf:
                          - $ref: "#/components/schemas/PeakWindow"
                          - type: object
                            properties:
                              startsInMinutes:
                                type: integer
                                description: Minutes until this window starts

  /riders/peak-hours/schedule:
    get:
      tags: [Rider Incentives]
      summary: Get peak-hour schedule
      description: |
        Returns the full weekly peak-hour schedule — all time windows,
        bonus rates, and which days they apply.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Peak-hour schedule retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/PeakWindow"
                        - type: object
                          properties:
                            days:
                              type: array
                              items:
                                type: string
                              example: ["Mon", "Tue", "Wed", "Thu", "Fri"]
                            daysOfWeek:
                              type: array
                              items:
                                type: integer
                              example: [1, 2, 3, 4, 5]

  # ============ RIDER BUDGET (Admin) ============

  /riders/budget/admin/dashboard:
    get:
      tags: [Rider Budget]
      summary: Get budget utilization dashboard (Admin)
      description: |
        Returns the current incentive budget utilization across daily,
        weekly, and monthly windows — spend vs cap, remaining, and status.
        Requires `RIDER_INCENTIVES_ENABLED` feature flag (strict mode).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Budget dashboard retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      daily:
                        $ref: "#/components/schemas/BudgetWindow"
                      weekly:
                        $ref: "#/components/schemas/BudgetWindow"
                      monthly:
                        $ref: "#/components/schemas/BudgetWindow"
                      pendingIncentives:
                        type: number
                      totalAvailableUnpaid:
                        type: number

  /riders/budget/admin/cap:
    put:
      tags: [Rider Budget]
      summary: Update budget cap (Admin)
      description: |
        Updates the cap amount for a specific budget window type.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [windowType, windowKey, capAmount]
              properties:
                windowType:
                  type: string
                  enum: [daily, weekly, monthly]
                windowKey:
                  type: string
                  description: "Window key (e.g. '2026-03-05', '2026-W10', '2026-03')"
                capAmount:
                  type: number
                  description: New cap amount in GHS
      responses:
        "200":
          description: Budget cap updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/BudgetWindow"

  /riders/budget/admin/approve:
    post:
      tags: [Rider Budget]
      summary: Trigger budget approval cycle (Admin)
      description: |
        Manually triggers an incentive budget approval cycle — moves
        `pending_budget` ledger entries to `available` status within caps.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Approval cycle completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    description: Result of the approval cycle

  # ============ RIDER PAYOUT ============

  /riders/wallet/withdrawal-policy:
    get:
      tags: [Rider Payout]
      summary: Get withdrawal policy
      description: |
        Returns the rider's withdrawal fee policy based on their partner level.
        Higher partner levels get more free instant withdrawals and lower fees.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Withdrawal policy retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      partnerLevel:
                        $ref: "#/components/schemas/PartnerLevel"
                      minWithdrawalAmount:
                        type: number
                        example: 5
                      instantWithdrawal:
                        type: object
                        properties:
                          fee:
                            type: number
                            description: Current fee for this withdrawal
                          isFree:
                            type: boolean
                          freeRemaining:
                            type: integer
                          freeUsed:
                            type: integer
                          totalQuota:
                            type: integer
                          standardFee:
                            type: number
                      weeklyAuto:
                        type: object
                        properties:
                          enabled:
                            type: boolean
                      allLevelPolicies:
                        type: array
                        items:
                          type: object
                          properties:
                            level:
                              $ref: "#/components/schemas/PartnerLevel"
                            freeInstantQuota:
                              type: integer
                            instantFee:
                              type: number
                            weeklyAutoEnabled:
                              type: boolean

  /riders/wallet/payout-history:
    get:
      tags: [Rider Payout]
      summary: Get payout history
      description: Returns the rider's most recent payout requests (up to 50).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Payout history retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        amount:
                          type: number
                        fee:
                          type: number
                        netAmount:
                          type: number
                        method:
                          type: string
                        status:
                          type: string
                        createdAt:
                          type: string
                          format: date-time

  /riders/wallet/incentive-balance:
    get:
      tags: [Rider Payout]
      summary: Get incentive balance
      description: |
        Returns the rider's pending (awaiting budget approval) and
        available (ready for payout) incentive balances.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Incentive balance retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      pendingBudgetApproval:
                        type: number
                        description: Amount awaiting budget approval
                      availableForPayout:
                        type: number
                        description: Amount ready for withdrawal/payout

  # ============ CHATS ============
  /chats:
    get:
      tags: [Chats]
      summary: Get chat conversations for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Chats retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Chat"

  /chats/{chatId}:
    get:
      tags: [Chats]
      summary: Get chat with messages
      security:
        - bearerAuth: []
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
        - name: before
          in: query
          schema:
            type: string
          description: Message ID for pagination
      responses:
        "200":
          description: Chat retrieved successfully
        "403":
          description: Not authorized
        "404":
          description: Chat not found

  /chats/{chatId}/messages:
    post:
      tags: [Chats]
      summary: Send a text message
      security:
        - bearerAuth: []
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  maxLength: 2000
      responses:
        "201":
          description: Message sent successfully
        "403":
          description: Not authorized
        "404":
          description: Chat not found

  /chats/{chatId}/messages/voice:
    post:
      tags: [Chats]
      summary: Send a voice message
      security:
        - bearerAuth: []
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [audio]
              properties:
                audio:
                  type: string
                  format: binary
                duration:
                  type: number
      responses:
        "201":
          description: Voice message sent
        "400":
          description: No audio file

  /chats/{chatId}/messages/images:
    post:
      tags: [Chats]
      summary: Send image messages (up to 10)
      security:
        - bearerAuth: []
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [images]
              properties:
                images:
                  type: array
                  items:
                    type: string
                    format: binary
                  maxItems: 10
      responses:
        "201":
          description: Images sent successfully
        "400":
          description: No images or too many images

  /chats/{chatId}/messages/{messageId}:
    put:
      tags: [Chats]
      summary: Edit a text message
      security:
        - bearerAuth: []
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
      responses:
        "200":
          description: Message edited successfully
        "400":
          description: Only text messages can be edited
        "403":
          description: Can only edit own messages
        "404":
          description: Message not found

    delete:
      tags: [Chats]
      summary: Delete a message
      security:
        - bearerAuth: []
      parameters:
        - name: chatId
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Message deleted successfully
        "403":
          description: Can only delete own messages
        "404":
          description: Message not found

  /calls/{callId}:
    get:
      tags: [Chats]
      summary: Get WebRTC call details by call ID
      security:
        - bearerAuth: []
      parameters:
        - name: callId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Call details retrieved
        "403":
          description: Not authorized
        "404":
          description: Call not found or expired

  # ============ STATUSES ============
  /statuses:
    get:
      tags: [Statuses]
      summary: Get all active statuses
      description: Retrieve active statuses with optional filtering by category, restaurant, or recommended
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [daily_special, discount, new_item, video]
          description: Filter by status category
        - name: restaurant
          in: query
          schema:
            type: string
          description: Filter by restaurant ID
        - name: recommended
          in: query
          schema:
            type: boolean
          description: Filter recommended statuses only
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Statuses retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Status"
                  pagination:
                    type: object
                    properties:
                      currentPage:
                        type: integer
                      totalPages:
                        type: integer
                      totalItems:
                        type: integer

    post:
      tags: [Statuses]
      summary: Create a new status
      description: Create a new status/story (restaurant or admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [restaurant, category, media]
              properties:
                restaurant:
                  type: string
                  description: Restaurant ID
                category:
                  type: string
                  enum: [daily_special, discount, new_item, video]
                title:
                  type: string
                  maxLength: 100
                description:
                  type: string
                  maxLength: 500
                media:
                  type: string
                  format: binary
                  description: Image or video file
                mediaType:
                  type: string
                  enum: [image, video]
                  default: image
                discountPercentage:
                  type: number
                  minimum: 0
                  maximum: 100
                promoCode:
                  type: string
                linkedFood:
                  type: string
                  description: Food item ID to link
                isRecommended:
                  type: boolean
                durationHours:
                  type: integer
                  minimum: 1
                  maximum: 168
                  default: 24
                  description: How long the status stays active (1-168 hours)
      responses:
        "201":
          description: Status created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/Status"
        "400":
          description: Validation error
        "404":
          description: Restaurant or linked food not found

  /statuses/stories:
    get:
      tags: [Statuses]
      summary: Get restaurant stories
      description: Get statuses grouped by restaurant for story ring display. Results are cached for 60 seconds.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [recent, engagement]
            default: recent
          description: Sort by most recent or highest engagement
      responses:
        "200":
