  # ============ SCHEDULED NOTIFICATIONS ============
  /scheduled-notifications:
    post:
      tags: [Scheduled Notifications]
      summary: Create a scheduled notification
      description: Schedule a notification to be sent at a specific future time (Admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scheduledFor, type, title, message]
              properties:
                scheduledFor:
                  type: string
                  format: date-time
                  example: "2025-12-25T09:00:00Z"
                timezone:
                  type: string
                  default: UTC
                type:
                  type: string
                  enum: [order, promo, update, system, comment_reply, comment_reaction, referral_completed, payment_confirmed, delivery_arriving, milestone_bonus]
                title:
                  type: string
                  maxLength: 200
                  example: "Christmas Special!"
                message:
                  type: string
                  maxLength: 500
                  example: "Get 50% off today!"
                data:
                  type: object
                  example: {"promoCode": "XMAS50", "route": "/promos"}
                targetType:
                  type: string
                  enum: [user, segment, all]
                  default: all
                targetUsers:
                  type: array
                  items:
                    type: string
                targetSegment:
                  type: object
                isRecurring:
                  type: boolean
                  default: false
                recurrencePattern:
                  type: object
                  properties:
                    frequency:
                      type: string
                      enum: [daily, weekly, monthly]
                    timeOfDay:
                      type: string
                    endDate:
                      type: string
                      format: date-time
      responses:
        '201':
          description: Scheduled notification created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  scheduledNotification:
                    $ref: '#/components/schemas/ScheduledNotification'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admin only

    get:
      tags: [Scheduled Notifications]
      summary: Get all scheduled notifications
      description: List scheduled notifications with optional filters (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, sent, cancelled, failed]
        - name: type
          in: query
          schema:
            type: string
            enum: [order, promo, update, system]
        - name: scheduledAfter
          in: query
          schema:
            type: string
            format: date-time
        - name: scheduledBefore
          in: query
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        '200':
          description: Scheduled notifications retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  notifications:
                    type: array
                    items:
                      $ref: '#/components/schemas/ScheduledNotification'
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admin only

  /scheduled-notifications/stats:
    get:
      tags: [Scheduled Notifications]
      summary: Get scheduled notification statistics
      description: Get counts by status (Admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Statistics retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  stats:
                    type: object
                    properties:
                      pending:
                        type: integer
                      sent:
                        type: integer
                      cancelled:
                        type: integer
                      failed:
                        type: integer
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admin only

  /scheduled-notifications/{id}:
    get:
      tags: [Scheduled Notifications]
      summary: Get single scheduled notification
      description: Get detailed information about a specific scheduled notification (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Scheduled notification retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  notification:
                    $ref: '#/components/schemas/ScheduledNotification'
        '404':
          description: Scheduled notification not found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admin only

    patch:
      tags: [Scheduled Notifications]
      summary: Update a scheduled notification
      description: Update a pending scheduled notification (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                scheduledFor:
                  type: string
                  format: date-time
                title:
                  type: string
                  maxLength: 200
                message:
                  type: string
                  maxLength: 500
                data:
                  type: object
                targetType:
                  type: string
                  enum: [user, segment, all]
                targetUsers:
                  type: array
                  items:
                    type: string
                targetSegment:
                  type: object
      responses:
        '200':
          description: Scheduled notification updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  notification:
                    $ref: '#/components/schemas/ScheduledNotification'
        '400':
          description: Validation error
        '404':
          description: Scheduled notification not found or cannot be updated
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admin only

    delete:
      tags: [Scheduled Notifications]
      summary: Cancel a scheduled notification
      description: Cancel a pending scheduled notification (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Scheduled notification cancelled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '404':
          description: Scheduled notification not found or cannot be cancelled
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admin only

