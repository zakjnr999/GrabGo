  /orders/{orderId}/delivery-code/resend:
    post:
      tags: [Orders]
      summary: Resend gift delivery verification code
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
