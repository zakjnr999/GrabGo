openapi: 3.0.3
info:
  title: GrabGo API
  description: |
    Backend API for GrabGo food delivery platform.

    ## Authentication
    Most endpoints require JWT authentication. Include the token in the Authorization header:
    ```
    Authorization: Bearer <your_jwt_token>
    ```

    ## User Roles
    - **customer**: Regular users who order food
    - **restaurant**: Restaurant owners/managers
    - **rider**: Delivery riders
    - **admin**: Platform administrators
  version: 1.0.0
  contact:
    name: GrabGo Support
  license:
    name: ISC

servers:
  - url: http://localhost:5000/api
    description: Development server
  - url: https://api.grabgo.com/api
    description: Production server

tags:
  - name: Users
    description: User authentication and profile management
  - name: Restaurants
    description: Restaurant registration and management
  - name: Foods
    description: Food items management
  - name: Categories
    description: Food categories
  - name: Orders
    description: Order lifecycle, COD, gift verification, pickup, and scheduling
  - name: Payments
    description: Payment records and cancellation
  - name: Tracking
    description: Real-time delivery tracking (initialize, location, status, snapshot)
  - name: Credits
    description: Wallet credit balance, transactions, and checkout calculation
  - name: Riders
    description: Rider operations and wallet
  - name: Rider Partner
    description: Rider partner level system — score, level, dashboard, history
  - name: Rider Incentives
    description: Quests, streaks, milestones, peak-hour bonuses, and incentive ledger
  - name: Rider Budget
    description: Admin budget window management for incentive caps
  - name: Rider Payout
    description: Rider withdrawal policy, payout history, and incentive balances
  - name: Chats
    description: Real-time chat between customers and riders
  - name: Statuses
    description: Restaurant stories and status updates (daily specials, discounts, new items, videos)
  - name: Notifications
    description: In-app notifications for users
  - name: Referrals
    description: Referral system for user acquisition
  - name: Promotions
    description: Promotional banners and campaigns
  - name: Notification Settings
    description: User notification preferences
  - name: Scheduled Notifications
    description: Schedule notifications to be sent at specific future times (Admin only)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from login/register endpoints

  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
          example: "507f1f77bcf86cd799439011"
        username:
          type: string
          example: "johndoe"
        email:
          type: string
          format: email
          example: "john@example.com"
        phone:
          type: string
          example: "+233201234567"
        isPhoneVerified:
          type: boolean
        isEmailVerified:
          type: boolean
        DateOfBirth:
          type: string
          format: date
        profilePicture:
          type: string
          format: uri
        isAdmin:
          type: boolean
        role:
          type: string
          enum: [customer, restaurant, rider, admin]
        isActive:
          type: boolean
        permissions:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    Restaurant:
      type: object
      properties:
        _id:
          type: string
        restaurant_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        address:
          type: string
        city:
          type: string
        logo:
          type: string
          format: uri
        food_type:
          type: string
        description:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        average_delivery_time:
          type: string
        delivery_fee:
          type: number
        min_order:
          type: number
        status:
          type: string
          enum: [pending, approved, rejected, suspended]
        rating:
          type: number
        is_open:
          type: boolean
        total_reviews:
          type: integer

    Food:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          $ref: "#/components/schemas/Category"
        restaurant:
          $ref: "#/components/schemas/Restaurant"
        food_image:
          type: string
          format: uri
        isAvailable:
          type: boolean
        ingredients:
          type: array
          items:
            type: string
        rating:
          type: number
        totalReviews:
          type: integer

    Category:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        description:
          type: string
        emoji:
          type: string
        isActive:
          type: boolean

    Order:
      type: object
      properties:
        _id:
          type: string
        orderNumber:
          type: string
        customer:
          $ref: "#/components/schemas/User"
        restaurant:
          $ref: "#/components/schemas/Restaurant"
        rider:
          $ref: "#/components/schemas/User"
        items:
          type: array
          items:
            type: object
            properties:
              food:
                type: string
              name:
                type: string
              quantity:
                type: integer
              price:
                type: number
              image:
                type: string
        subtotal:
          type: number
        deliveryFee:
          type: number
        tax:
          type: number
        totalAmount:
          type: number
        deliveryAddress:
          type: string
        paymentMethod:
          type: string
          enum: [cash, card]
        paymentStatus:
          type: string
          enum: [pending, paid, failed]
        status:
          type: string
          enum:
            [
              pending,
              confirmed,
              preparing,
              ready,
              picked_up,
              on_the_way,
              delivered,
              cancelled,
            ]
        notes:
          type: string
        createdAt:
          type: string
          format: date-time

    Payment:
      type: object
      properties:
        _id:
          type: string
        referenceId:
          type: string
        order:
          type: string
        customer:
          type: string
        paymentMethod:
          type: string
        provider:
          type: string
        amount:
          type: number
        currency:
          type: string
        phoneNumber:
          type: string
        status:
          type: string
          enum: [pending, processing, successful, failed, cancelled]

    Chat:
      type: object
      properties:
        id:
          type: string
        orderId:
          type: string
        orderNumber:
          type: string
        otherUser:
          type: object
          properties:
            id:
              type: string
            username:
              type: string
            role:
              type: string
        lastMessage:
          type: string
        lastMessageType:
          type: string
        lastMessageAt:
          type: string
          format: date-time
        unreadCount:
          type: integer

    Message:
      type: object
      properties:
        _id:
          type: string
        sender:
          type: string
        text:
          type: string
        messageType:
          type: string
          enum: [text, voice, image]
        audioUrl:
          type: string
        audioDuration:
          type: number
        imageUrls:
          type: array
          items:
            type: string
        readBy:
          type: array
          items:
            type: string
        isEdited:
          type: boolean
        createdAt:
          type: string
          format: date-time

    RiderWallet:
      type: object
      properties:
        balance:
          type: number
        totalEarnings:
          type: number
        totalWithdrawals:
          type: number
        pendingWithdrawals:
          type: number

    # ── Rider Partner & Incentive Schemas ──

    PartnerLevel:
      type: string
      enum: [L1, L2, L3, L4, L5]
      description: |
        Rider partner level:
        - **L1** (0-39): New Partner — 1.0× multiplier
        - **L2** (40-59): Bronze — 1.1× multiplier
        - **L3** (60-74): Silver — 1.2× multiplier
        - **L4** (75-89): Gold — 1.4× multiplier
        - **L5** (90-100): Platinum — 1.6× multiplier

    NextLevelTarget:
      type: object
      nullable: true
      description: Target info for the next partner level (null if already L5)
      properties:
        nextLevel:
          $ref: "#/components/schemas/PartnerLevel"
        scoreRequired:
          type: number
          description: Minimum score needed for next level
        scoreGap:
          type: number
          description: Points still needed to reach next level
        requirements:
          type: object
          nullable: true
          properties:
            minDeliveries:
              type: integer
            minRating:
              type: number
            minCompletionRate:
              type: number
        multiplier:
          type: number
        dispatchBonus:
          type: integer

    LevelChange:
      type: object
      properties:
        id:
          type: string
        riderId:
          type: string
        fromLevel:
          $ref: "#/components/schemas/PartnerLevel"
        toLevel:
          $ref: "#/components/schemas/PartnerLevel"
        score:
          type: number
        reason:
          type: string
        changedAt:
          type: string
          format: date-time

    QuestProgress:
      type: object
      properties:
        questId:
          type: string
        name:
          type: string
          example: "Daily Grinder"
        description:
          type: string
        period:
          type: string
          enum: [daily, weekly]
        windowKey:
          type: string
          example: "2026-03-05"
        currentCount:
          type: integer
        targetCount:
          type: integer
        percentComplete:
          type: number
        status:
          type: string
          enum: [active, completed, expired]
        completedAt:
          type: string
          format: date-time
          nullable: true
        baseReward:
          type: number
          description: Base reward in GHS
        multiplier:
          type: number
          description: Partner level multiplier applied
        finalReward:
          type: number
          description: Reward after multiplier
        minLevel:
          $ref: "#/components/schemas/PartnerLevel"

    StreakDashboard:
      type: object
      properties:
        currentStreak:
          type: integer
          description: Current consecutive delivery days
        longestStreak:
          type: integer
        streakStartDate:
          type: string
          format: date
        lastDeliveryDate:
          type: string
          format: date
        nextReward:
          type: object
          nullable: true
          properties:
            daysNeeded:
              type: integer
            threshold:
              type: integer
            label:
              type: string
            baseReward:
              type: number
            finalReward:
              type: number
        allThresholds:
          type: array
          items:
            type: object
            properties:
              days:
                type: integer
              label:
                type: string
              baseReward:
                type: number
              finalReward:
                type: number
              achieved:
                type: boolean
        recentRewards:
          type: array
          items:
            type: object
            properties:
              streakCount:
                type: integer
              rewardAmount:
                type: number
              awardedAt:
                type: string
                format: date-time

    MilestoneDashboard:
      type: object
      properties:
        totalCompleted:
          type: integer
        totalAvailable:
          type: integer
        nextMilestone:
          type: object
          nullable: true
        milestones:
          type: array
          items:
            type: object
            properties:
              milestoneId:
                type: string
              name:
                type: string
                example: "Century Rider"
              description:
                type: string
              badgeIcon:
                type: string
              currentCount:
                type: integer
              targetCount:
                type: integer
              percentComplete:
                type: number
              isCompleted:
                type: boolean
              completedAt:
                type: string
                format: date-time
                nullable: true
              baseReward:
                type: number
              finalReward:
                type: number
        recentRewards:
          type: array
          items:
            type: object
            properties:
              milestoneName:
                type: string
              badgeIcon:
                type: string
              rewardAmount:
                type: number
              awardedAt:
                type: string
                format: date-time

    IncentiveSummary:
      type: object
      properties:
        windowKey:
          type: string
        totalEntries:
          type: integer
        totalPending:
          type: number
          description: Total pending budget approval (GHS)
        totalAvailable:
          type: number
          description: Total available for payout (GHS)
        totalPaidOut:
          type: number
          description: Total already paid out (GHS)
        bySource:
          type: object
          additionalProperties:
            type: object
            properties:
              count:
                type: integer
              total:
                type: number
          example:
            quest: { count: 3, total: 15.0 }
            streak: { count: 1, total: 5.0 }
            peak_hour: { count: 5, total: 22.5 }
        entries:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              sourceType:
                type: string
                enum: [quest, streak, milestone, peak_hour]
              baseAmount:
                type: number
              multiplier:
                type: number
              finalAmount:
                type: number
              status:
                type: string
                enum: [pending_budget, available, paid_out, expired]
              metadata:
                type: object
              createdAt:
                type: string
                format: date-time

    PeakWindow:
      type: object
      properties:
        id:
          type: string
          example: "lunch_rush"
        label:
          type: string
          example: "Lunch Rush"
        start:
          type: string
          example: "11:30"
        end:
          type: string
          example: "13:30"
        bonusRate:
          type: number
          example: 0.20
        bonusPercent:
          type: integer
          example: 20

    BudgetWindow:
      type: object
      properties:
        windowKey:
          type: string
        capAmount:
          type: number
        spentAmount:
          type: number
        remaining:
          type: number
        status:
          type: string
          enum: [active, exhausted, closed]
        utilizationPercent:
          type: number

    Status:
      type: object
      properties:
        _id:
          type: string
        restaurant:
          $ref: "#/components/schemas/Restaurant"
        category:
          type: string
          enum: [daily_special, discount, new_item, video]
          description: |
            - daily_special: Today's special dishes
            - discount: Promotional discounts
            - new_item: New menu items
            - video: Video stories
        title:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 500
        mediaType:
          type: string
          enum: [image, video]
        mediaUrl:
          type: string
          format: uri
        thumbnailUrl:
          type: string
          format: uri
        blurHash:
          type: string
        discountPercentage:
          type: number
          minimum: 0
          maximum: 100
        promoCode:
          type: string
        linkedFood:
          $ref: "#/components/schemas/Food"
        viewCount:
          type: integer
        likeCount:
          type: integer
        totalViewDuration:
          type: integer
          description: Total view duration in milliseconds
        avgViewDuration:
          type: integer
          description: Average view duration in milliseconds
        engagementScore:
          type: number
          description: Calculated engagement score (views + likes*2 + duration factor)
        isActive:
          type: boolean
        isRecommended:
          type: boolean
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    Story:
      type: object
      description: Aggregated story data for a restaurant (for story ring display)
      properties:
        restaurantId:
          type: string
        restaurantName:
          type: string
        logo:
          type: string
          format: uri
        statusCount:
          type: integer
          description: Number of active statuses
        categories:
          type: array
          items:
            type: string
            enum: [daily_special, discount, new_item, video]
        totalViews:
          type: integer
          description: Total views across all statuses
        totalLikes:
          type: integer
          description: Total likes across all statuses
        totalEngagement:
          type: number
          description: Total engagement score
        latestStatusAt:
          type: string
          format: date-time
        latestCategory:
          type: string

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        error:
          type: string

    Success:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string

    ScheduledNotification:
      type: object
      properties:
        _id:
          type: string
          example: "507f1f77bcf86cd799439011"
        scheduledFor:
          type: string
          format: date-time
          description: When to send the notification
        timezone:
          type: string
          default: UTC
          example: "Africa/Accra"
        status:
          type: string
          enum: [pending, sent, cancelled, failed]
          description: Current status of the scheduled notification
        type:
          type: string
          enum:
            [
              order,
              promo,
              update,
              system,
              comment_reply,
              comment_reaction,
              referral_completed,
              payment_confirmed,
              delivery_arriving,
              milestone_bonus,
            ]
          description: Type of notification
        title:
          type: string
          maxLength: 200
          example: "Flash Sale!"
        message:
          type: string
          maxLength: 500
          example: "Get 50% off all orders for the next hour!"
        data:
          type: object
          description: Additional data for deep linking
          properties:
            route:
              type: string
            promoCode:
              type: string
        targetType:
          type: string
          enum: [user, segment, all]
          description: Who should receive this notification
        targetUsers:
          type: array
          items:
            type: string
          description: Specific user IDs (when targetType is 'user')
        targetSegment:
          type: object
          description: Segment criteria (when targetType is 'segment')
          properties:
            inactive:
              type: boolean
            daysSinceLastOrder:
              type: integer
            newUsers:
              type: boolean
            registeredWithinDays:
              type: integer
        isRecurring:
          type: boolean
          default: false
        recurrencePattern:
          type: object
          properties:
            frequency:
              type: string
              enum: [daily, weekly, monthly]
            timeOfDay:
              type: string
              example: "12:00"
            endDate:
              type: string
              format: date-time
        createdBy:
          type: string
          description: Admin user who created this
        sentAt:
          type: string
          format: date-time
        failureReason:
          type: string
        retryCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Notification:
      type: object
      properties:
        _id:
          type: string
        user:
          type: string
        type:
          type: string
          enum:
            [
              order,
              promo,
              update,
              system,
              comment_reply,
              comment_reaction,
              referral_completed,
              payment_confirmed,
              delivery_arriving,
              milestone_bonus,
            ]
        title:
          type: string
        message:
          type: string
        isRead:
          type: boolean
        data:
          type: object
        actors:
          type: array
          items:
            type: object
            properties:
              actorId:
                type: string
              actorName:
                type: string
              actorAvatar:
                type: string
        actorCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    ReferralCode:
      type: object
      properties:
        code:
          type: string
          example: "ABC12345"
        shareUrl:
          type: string
          example: "https://grabgo.app/r/ABC12345"
        totalReferrals:
          type: integer
        completedReferrals:
          type: integer
        pendingReferrals:
          type: integer
        totalEarned:
          type: number
        availableCredit:
          type: string

    Referral:
      type: object
      properties:
        id:
          type: string
        refereeName:
          type: string
        status:
          type: string
          enum: [pending_order, completed, expired]
        creditEarned:
          type: number
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    UserCredit:
      type: object
      properties:
        id:
          type: string
        amount:
          type: number
        source:
          type: string
          enum: [referral_received, referral_earned, promo, milestone_bonus]
        expiresAt:
          type: string
          format: date-time
        description:
          type: string

    PromotionalBanner:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        subtitle:
          type: string
        imageUrl:
          type: string
          format: uri
        targetUrl:
          type: string
        targetScreen:
          type: string
        priority:
          type: integer
        isActive:
          type: boolean
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    NotificationSettings:
      type: object
      properties:
        chatMessages:
          type: boolean
          default: true
        orderUpdates:
          type: boolean
          default: true
        promoNotifications:
          type: boolean
          default: true
        commentReplies:
          type: boolean
          default: true
        commentReactions:
          type: boolean
          default: true
        referralUpdates:
          type: boolean
          default: true
        paymentUpdates:
          type: boolean
          default: true
        deliveryUpdates:
          type: boolean
          default: true
        systemUpdates:
          type: boolean
          default: true

paths:
  # ============ USERS ============
  /users:
    post:
      tags: [Users]
      summary: Register a new user
      description: Register a new user (regular or Google sign-up)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - title: Regular Registration
                  type: object
                  required: [username, email, password]
                  properties:
                    username:
                      type: string
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                      minLength: 6
                    DateOfBirth:
                      type: string
                      format: date
                    phone:
                      type: string
                    profilePicture:
                      type: string
                    role:
                      type: string
                      enum: [customer, restaurant, rider, admin]
                - title: Google Registration
                  type: object
                  required: [googleId, email, displayName]
                  properties:
                    googleId:
                      type: string
                    email:
                      type: string
                      format: email
                    displayName:
                      type: string
                    photoUrl:
                      type: string
                    role:
                      type: string
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: "#/components/schemas/User"
                  token:
                    type: string
        "400":
          description: Validation error or user already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users/login:
    post:
      tags: [Users]
      summary: Login user
      description: Login with email/password or Google credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - title: Regular Login
                  type: object
                  required: [email, password]
                  properties:
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                - title: Google Login
                  type: object
                  required: [googleId, email]
                  properties:
                    googleId:
                      type: string
                    email:
                      type: string
                    displayName:
                      type: string
                    photoUrl:
                      type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: "#/components/schemas/User"
                  token:
                    type: string
        "401":
          description: Invalid credentials
        "403":
          description: Account deactivated

  /users/me:
    get:
      tags: [Users]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /users/{userId}:
    get:
      tags: [Users]
      summary: Get user by ID
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
