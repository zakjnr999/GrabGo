version: '3.8'

services:
  backend:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/grabgo
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_jwt_key_change_this}
      - JWT_EXPIRE=7d
      - API_KEY=${API_KEY:-pAuLInepisT_les}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:

